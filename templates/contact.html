{% extends "base.html" %}

{% block title %}Contact | TutorMatch AI{% endblock %}

{% block content %}
<section class="bg-white">
  <div class="mx-auto grid max-w-6xl gap-8 px-4 py-16 lg:grid-cols-[0.9fr_1.1fr]">
    <div>
      <p class="text-sm font-semibold uppercase tracking-wide text-emerald-700">Contact</p>
      <h1 class="mt-4 text-4xl font-bold tracking-tight">Talk to the TutorMatch AI team.</h1>
      <p class="mt-5 text-lg leading-8 text-slate-600">Use this page as the public contact point for early tutor onboarding, parent support, and partnership requests.</p>
    </div>
    <form class="rounded-lg border border-slate-200 bg-slate-50 p-6">
      <div class="grid gap-4">
        <label class="text-sm font-semibold">Name<input class="mt-2 w-full rounded-md border border-slate-200 px-4 py-3 font-normal" placeholder="Your name"></label>
        <label class="text-sm font-semibold">Email<input class="mt-2 w-full rounded-md border border-slate-200 px-4 py-3 font-normal" placeholder="you@example.com"></label>
        <label class="text-sm font-semibold">Message<textarea class="mt-2 min-h-32 w-full rounded-md border border-slate-200 px-4 py-3 font-normal" placeholder="How can we help?"></textarea></label>
        <button class="rounded-md bg-emerald-700 px-5 py-3 text-sm font-semibold text-white hover:bg-emerald-800" type="button">Send Message</button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
