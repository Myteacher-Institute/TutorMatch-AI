{% extends "base.html" %}
{% load static %}

{% block title %}Page Not Found | TutorMatch AI{% endblock %}

{% block content %}
<div class="mtc-shell">
  <div class="mtc-404-container">
    <div class="mtc-404-icon">
      <svg viewBox="0 0 100 100" width="80" height="80" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="50" cy="50" r="40"/>
        <line x1="30" y1="30" x2="70" y2="70"/>
        <line x1="70" y1="30" x2="30" y2="70"/>
      </svg>
    </div>
    <h1>404 - Page Not Found</h1>
    <p class="mtc-404-text">Sorry, we couldn't find the page you're looking for. It might have been moved, renamed, or doesn't exist.</p>
    <div class="mtc-404-actions">
      <a href="{% url 'home' %}" class="btn btn-primary" style="border-radius: 999px; font-weight: 700; padding: 0 28px; background: #2563eb; border-color: #2563eb; box-shadow: 0 4px 14px rgba(37,99,235,0.25);">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Go to Homepage
      </a>
      <button onclick="history.back()" class="btn btn-ghost" style="border-radius: 999px; font-weight: 600; padding: 0 24px;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 6px;">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Go Back
      </button>
    </div>
  </div>
</div>

<style>
.mtc-404-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 20px;
  min-height: 70vh;
}
.mtc-404-icon {
  margin-bottom: 24px;
  opacity: 0.6;
}
.mtc-404-container h1 {
  font-size: clamp(28px, 5vw, 36px);
  font-weight: 800;
  color: #111827;
  margin: 0 0 12px;
}
.mtc-404-text {
  font-size: 16px;
  color: #64748b;
  margin: 0 0 32px;
  max-width: 480px;
  line-height: 1.6;
}
.mtc-404-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
</style>
{% endblock %}
