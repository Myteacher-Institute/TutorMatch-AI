{% if page_obj.has_other_pages %}
{% with q=request.GET.q %}
<nav class="mtc-chat-pagination" aria-label="Chat list pagination">
  {% if page_obj.has_previous %}
  <a href="?page={{ page_obj.previous_page_number }}{% if q %}&q={{ q }}{% endif %}"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i> Previous</a>
  {% else %}
  <span class="is-disabled"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i> Previous</span>
  {% endif %}

  <span class="mtc-chat-pagination-summary">
    Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
  </span>

  {% if page_obj.has_next %}
  <a href="?page={{ page_obj.next_page_number }}{% if q %}&q={{ q }}{% endif %}">Next <i class="fa-solid fa-chevron-right" aria-hidden="true"></i></a>
  {% else %}
  <span class="is-disabled">Next <i class="fa-solid fa-chevron-right" aria-hidden="true"></i></span>
  {% endif %}
</nav>
{% endwith %}
{% endif %}
