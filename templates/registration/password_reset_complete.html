{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete | Myteacherconnect{% endblock %}

{% block content %}
<section class="mtc-auth-section">
  <div class="mtc-auth-decor-1"></div>
  <div class="mtc-auth-decor-2"></div>

  <div class="mtc-auth-container" style="grid-template-columns: 0.85fr 1.15fr;">
    <aside class="mtc-auth-sidebar">
      <img src="{% static 'images/Register-image.png' %}" alt="Myteacherconnect success preview">
    </aside>

    <div class="mtc-auth-form-wrapper">
      <div class="mtc-auth-form-card" style="text-align: center;">
        <div style="display: grid; width: 56px; height: 56px; place-items: center; border-radius: 999px; background: #dcfce7; color: #166534; margin: 0 auto 20px;">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>Password Reset Complete</h1>
        <p class="subtitle" style="margin-top: 12px; margin-bottom: 24px; line-height: 1.6;">
          Your password has been successfully set. You can now log in using your new password.
        </p>

        <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%; border-radius: 8px;">Log In Now</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
