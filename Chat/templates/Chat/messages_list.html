{% load static %}

{% for message in chat_messages_list %}
<div class="message-item {% if message.sender == request.user %}my-message{% else %}other-message{% endif %}" data-message-id="{{ message.id }}" style="display: flex; margin-bottom: 16px; {% if message.sender == request.user %}justify-content: flex-end;{% endif %}">
  <div style="max-width: 70%; padding: 10px 15px; border-radius: 18px; {% if message.sender == request.user %}background: #2563eb; color: #ffffff; border-bottom-right-radius: 4px;{% else %}background: #e2e8f0; color: #111827; border-bottom-left-radius: 4px;{% endif %}">
    <p style="margin: 0; font-size: 15px; line-height: 1.4;">{{ message.message }}</p>
    <span style="display: block; font-size: 10px; margin-top: 5px; opacity: 0.7; text-align: {% if message.sender == request.user %}right{% else %}left{% endif %};">{{ message.timestamp|date:"H:i" }}</span>
  </div>
</div>
{% endfor %}
